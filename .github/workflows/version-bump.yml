name: Version bump

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Version component to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-bump-main
  cancel-in-progress: false

env:
  DEVELOPMENT_BRANCH: dev
  RELEASE_BRANCH: main

jobs:
  bump-version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.actor != 'github-actions[bot]' &&
        !startsWith(github.event.head_commit.message, 'chore: bump version')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check release source
        id: release_source
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_info="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq 'if length > 0 then .[0] | [.number, .head.ref, .base.ref, .head.repo.full_name] | @tsv else "" end' \
              2>/dev/null || true
          )"

          pr_number=""
          head_ref=""
          base_ref=""
          head_repo=""

          if [ -n "$pr_info" ]; then
            IFS=$'\t' read -r pr_number head_ref base_ref head_repo <<< "$pr_info"
          fi

          if [ "$head_ref" = "$DEVELOPMENT_BRANCH" ] &&
             [ "$base_ref" = "$RELEASE_BRANCH" ] &&
             [ "$head_repo" = "$GITHUB_REPOSITORY" ]; then
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "Version bump enabled for ${DEVELOPMENT_BRANCH} -> ${RELEASE_BRANCH} PR #${pr_number}"
          else
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            echo "Skipping version bump. Expected ${DEVELOPMENT_BRANCH} -> ${RELEASE_BRANCH}; got ${head_repo:-unknown}:${head_ref:-unknown} -> ${base_ref:-unknown}."
          fi

      - name: Choose bump kind
        id: bump
        if: github.event_name == 'workflow_dispatch' || steps.release_source.outputs.should_bump == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || '' }}
          PR_NUMBER: ${{ steps.release_source.outputs.pr_number }}
        run: |
          set -euo pipefail

          bump="${BUMP_INPUT:-}"

          if [ -z "$bump" ]; then
            if [ -n "${PR_NUMBER:-}" ]; then
              labels="$(
                gh api \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
                  --jq '.labels[].name' 2>/dev/null || true
              )"
            else
              labels=""
            fi

            if printf '%s\n' "$labels" | grep -Fxq "version:major"; then
              bump="major"
            elif printf '%s\n' "$labels" | grep -Fxq "version:minor"; then
              bump="minor"
            else
              bump="patch"
            fi
          fi

          echo "kind=$bump" >> "$GITHUB_OUTPUT"
          echo "Using $bump version bump"

      - name: Bump workspace version
        id: version
        if: github.event_name == 'workflow_dispatch' || steps.release_source.outputs.should_bump == 'true'
        run: .github/scripts/bump_version.py "${{ steps.bump.outputs.kind }}"

      - name: Prepare changelog release notes
        if: github.event_name == 'workflow_dispatch' || steps.release_source.outputs.should_bump == 'true'
        run: |
          set -euo pipefail
          .github/scripts/changelog_release.py prepare \
            "${{ steps.version.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Date changelog release
        if: github.event_name == 'workflow_dispatch' || steps.release_source.outputs.should_bump == 'true'
        run: |
          set -euo pipefail
          .github/scripts/changelog_release.py finalize \
            "${{ steps.version.outputs.version }}" \
            --date "$(date -u +%F)"

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch' || steps.release_source.outputs.should_bump == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch' || steps.release_source.outputs.should_bump == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="v${{ steps.version.outputs.version }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi

          gh release create "$tag" \
            --title "$tag" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --target "$(git rev-parse HEAD)"
